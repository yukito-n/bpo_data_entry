<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BPO Operations Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/app.js" defer></script>
</head>
<body>
<section class="section">
<div class="container">
    <div id="login-view">
        <h1 class="title has-text-centered">Login</h1>
        <form id="loginForm" class="box" style="max-width:400px;margin:0 auto;">
            <div class="field">
                <label class="label">Username</label>
                <div class="control">
                    <input class="input" name="username" required>
                </div>
            </div>
            <div class="field">
                <label class="label">Password</label>
                <div class="control">
                    <input class="input" type="password" name="password" required>
                </div>
            </div>
            <div class="field has-text-centered">
                <button class="button is-link" type="submit">Login</button>
            </div>
            <p class="has-text-centered"><a id="showRegister" href="#">Create account</a></p>
        </form>
    </div>

    <div id="register-view" class="is-hidden">
        <h1 class="title has-text-centered">Register</h1>
        <form id="registerForm" class="box" style="max-width:400px;margin:0 auto;">
            <div class="field">
                <label class="label">Username</label>
                <div class="control">
                    <input class="input" name="username" required>
                </div>
            </div>
            <div class="field">
                <label class="label">Password</label>
                <div class="control">
                    <input class="input" type="password" name="password" required>
                </div>
            </div>
            <div class="field has-text-centered">
                <button class="button is-primary" type="submit">Register</button>
                <button class="button is-text" type="button" id="cancelRegister">Cancel</button>
            </div>
        </form>
    </div>

    <div id="app-view" class="is-hidden">
        <nav class="tabs is-boxed">
            <ul>
                <li class="is-active"><a data-tab="projects">Projects</a></li>
                <li><a data-tab="batches">Batches</a></li>
            </ul>
        </nav>
        <div id="projects" class="tab-content">
            <form id="projectForm" class="box">
                <h2 class="subtitle">Create Project</h2>
                <div class="field">
                    <label class="label">Name</label>
                    <input class="input" name="name" required>
                </div>
                <div class="field">
                    <label class="label">Client</label>
                    <input class="input" name="client" required>
                </div>
                <div class="field has-text-right">
                    <button class="button is-primary" type="submit">Create</button>
                </div>
            </form>
            <table class="table is-fullwidth" id="projectTable">
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Client</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="batches" class="tab-content is-hidden">
            <form id="batchForm" class="box">
                <h2 class="subtitle">Create Batch</h2>
                <div class="field">
                    <label class="label">Project ID</label>
                    <input class="input" type="number" name="project_id" required>
                </div>
                <div class="field">
                    <label class="label">Reception Date</label>
                    <input class="input" type="datetime-local" name="reception_date" required>
                </div>
                <div class="field">
                    <label class="label">Due Date</label>
                    <input class="input" type="datetime-local" name="due_date" required>
                </div>
                <div class="field">
                    <label class="label">Volume</label>
                    <input class="input" type="number" name="volume" required>
                </div>
                <div class="field has-text-right">
                    <button class="button is-primary" type="submit">Create</button>
                </div>
            </form>
            <table class="table is-fullwidth" id="batchTable">
                <thead>
                    <tr><th>ID</th><th>Project</th><th>Status</th><th>Due</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
</section>
</body>
</html>
